<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚡ Проклятая Битва</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@500;700&display=swap');

:root {
  --bg: #050a0f;
  --panel: #0c1520;
  --border: #1a3a5c;
  --accent: #00d4ff;
  --red: #ff2244;
  --purple: #9b30ff;
  --gold: #ffcc00;
  --green: #00ff88;
  --text: #c8dde8;
  --muted: #4a6b80;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background */
body::before {
  content:'';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%, rgba(155,48,255,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 80%, rgba(0,212,255,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 30% 30% at 50% 50%, rgba(255,34,68,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Floating particles */
.particle {
  position: fixed;
  width: 2px; height: 2px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
  animation: floatUp linear infinite;
  z-index: 0;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(1); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.2; }
  100% { transform: translateY(-20px) scale(0); opacity: 0; }
}

#app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 80px 0;
}

/* ── HEADER ── */
#header {
  background: linear-gradient(180deg, #080f17 0%, var(--panel) 100%);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 10px;
  position: sticky;
  top: 0;
  z-index: 100;
}

#header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

#title {
  font-family: 'Cinzel', serif;
  font-size: 1.1em;
  font-weight: 900;
  letter-spacing: 3px;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(0,212,255,0.5);
}

#level-badge {
  background: linear-gradient(135deg, var(--purple), #5500aa);
  border: 1px solid rgba(155,48,255,0.5);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 0.75em;
  font-weight: 700;
  letter-spacing: 1px;
  color: white;
}

/* Energy display */
#energy-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

#energy-icon {
  font-size: 1.4em;
  animation: energyPulse 2s ease-in-out infinite;
}

@keyframes energyPulse {
  0%,100% { filter: drop-shadow(0 0 4px var(--accent)); }
  50% { filter: drop-shadow(0 0 12px var(--accent)); }
}

#energy-amount {
  font-family: 'Cinzel', serif;
  font-size: 1.8em;
  font-weight: 900;
  color: var(--accent);
  text-shadow: 0 0 15px rgba(0,212,255,0.4);
  min-width: 120px;
}

#stats-mini {
  display: flex;
  gap: 14px;
  margin-left: auto;
}

.stat-mini {
  text-align: center;
}

.stat-mini .val {
  display: block;
  font-size: 1em;
  font-weight: 700;
  color: var(--green);
}

.stat-mini .lbl {
  font-size: 0.65em;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Progress bar */
#xp-bar-wrap {
  height: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
}

#xp-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--purple), var(--accent));
  border-radius: 2px;
  transition: width 0.4s ease;
  box-shadow: 0 0 8px rgba(0,212,255,0.5);
}

#xp-text {
  font-size: 0.65em;
  color: var(--muted);
  text-align: right;
  margin-top: 2px;
  letter-spacing: 1px;
}

/* ── CLICKER ── */
#clicker-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 16px;
  gap: 12px;
}

#quote-box {
  width: 100%;
  background: rgba(0,212,255,0.04);
  border: 1px solid rgba(0,212,255,0.15);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  font-size: 0.85em;
  font-style: italic;
  color: rgba(200,221,232,0.7);
  line-height: 1.4;
}

#quote-box .quote-author {
  color: var(--accent);
  font-style: normal;
  font-size: 0.9em;
  margin-top: 4px;
  font-weight: 700;
}

/* Main clicker orb */
#orb-wrap {
  position: relative;
  width: 200px;
  height: 200px;
  cursor: pointer;
}

#orb {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%,
    rgba(0,212,255,0.3) 0%,
    rgba(155,48,255,0.2) 40%,
    rgba(5,10,15,0.9) 100%
  );
  border: 2px solid rgba(0,212,255,0.4);
  box-shadow:
    0 0 40px rgba(0,212,255,0.15),
    0 0 80px rgba(155,48,255,0.1),
    inset 0 0 40px rgba(0,212,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 80px;
  transition: transform 0.1s;
  animation: orbFloat 3s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}

#orb::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, transparent 0%, rgba(0,212,255,0.3) 20%, transparent 40%);
  animation: orbSpin 4s linear infinite;
}

@keyframes orbSpin {
  to { transform: rotate(360deg); }
}

@keyframes orbFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

#orb:active { transform: scale(0.93) !important; }

#orb-rings {
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  border: 1px solid rgba(0,212,255,0.1);
  animation: ringExpand 2s ease-out infinite;
}

@keyframes ringExpand {
  0% { transform: scale(0.9); opacity: 0.5; }
  100% { transform: scale(1.1); opacity: 0; }
}

/* Click particles */
.click-pop {
  position: absolute;
  pointer-events: none;
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: 1.1em;
  color: var(--accent);
  text-shadow: 0 0 10px var(--accent);
  animation: popFloat 0.9s ease forwards;
  z-index: 50;
  white-space: nowrap;
}

@keyframes popFloat {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
  20% { transform: translate(-50%, -80%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -200%) scale(0.8); }
}

/* ── TABS ── */
#tabs {
  display: flex;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  overflow-x: auto;
  scrollbar-width: none;
}

#tabs::-webkit-scrollbar { display: none; }

.tab-btn {
  flex: 1;
  min-width: 80px;
  padding: 10px 6px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.75em;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
}

.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: rgba(0,212,255,0.05);
}

.tab-btn:hover:not(.active) {
  color: var(--text);
  background: rgba(255,255,255,0.03);
}

/* ── SHOP ── */
#shop {
  padding: 12px;
  display: none;
}

#shop.active { display: block; }

.shop-section-title {
  font-family: 'Cinzel', serif;
  font-size: 0.95em;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 10px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.shop-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 18px;
}

.shop-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 10px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.shop-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0,212,255,0.05) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.2s;
}

.shop-card:hover::before, .shop-card:active::before { opacity: 1; }
.shop-card:hover { border-color: rgba(0,212,255,0.3); transform: translateY(-1px); }
.shop-card:active { transform: scale(0.97); }

.shop-card.cant-afford {
  opacity: 0.5;
  cursor: not-allowed;
}

.shop-card.cant-afford:hover { transform: none; border-color: var(--border); }

.rarity-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 0.6em;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 1px 5px;
  border-radius: 3px;
}

.rarity-common { color: #aaa; background: rgba(170,170,170,0.1); border: 1px solid #444; }
.rarity-rare { color: #4af; background: rgba(68,170,255,0.1); border: 1px solid #4af; }
.rarity-epic { color: var(--purple); background: rgba(155,48,255,0.1); border: 1px solid var(--purple); }
.rarity-legendary { color: var(--gold); background: rgba(255,204,0,0.1); border: 1px solid var(--gold); }

.shop-icon { font-size: 2em; margin-bottom: 4px; display: block; }

.shop-name {
  font-weight: 700;
  font-size: 0.9em;
  color: white;
  margin-bottom: 2px;
  line-height: 1.2;
}

.shop-bonus {
  font-size: 0.8em;
  color: var(--green);
  margin-bottom: 6px;
  font-weight: 700;
}

.shop-price {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.85em;
  font-weight: 700;
  color: var(--accent);
}

.shop-level-dots {
  display: flex;
  gap: 3px;
  margin-top: 6px;
}

.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
}

.dot.filled { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 4px var(--accent); }

/* ── LEADERBOARD ── */
#leaderboard {
  padding: 12px;
  display: none;
}

#leaderboard.active { display: block; }

.leader-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  transition: all 0.2s;
}

.leader-row:hover { border-color: rgba(0,212,255,0.3); }
.leader-row.is-you { border-color: var(--accent); background: rgba(0,212,255,0.05); }

.leader-rank {
  font-family: 'Cinzel', serif;
  font-size: 1.2em;
  font-weight: 900;
  min-width: 28px;
  text-align: center;
}

.rank-1 { color: var(--gold); text-shadow: 0 0 10px rgba(255,204,0,0.5); }
.rank-2 { color: #aaa; }
.rank-3 { color: #cd7f32; }

.leader-name {
  flex: 1;
  font-size: 1em;
  font-weight: 700;
  color: white;
}

.leader-score {
  font-size: 0.95em;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── FLOATING BTN ── */
#tap-hint {
  text-align: center;
  font-size: 0.75em;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: hintBlink 2s ease-in-out infinite;
}

@keyframes hintBlink {
  0%,100% { opacity: 0.4; }
  50% { opacity: 0.9; }
}

/* Toast */
#toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(0,212,255,0.15);
  border: 1px solid var(--accent);
  border-radius: 20px;
  padding: 8px 18px;
  font-size: 0.85em;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 200;
  pointer-events: none;
  white-space: nowrap;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Screen flash on buy */
.screen-flash {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 300;
  animation: flashFade 0.4s ease forwards;
}

@keyframes flashFade {
  0% { background: rgba(0,212,255,0.15); }
  100% { background: transparent; }
}
</style>
</head>
<body>

<!-- Particles -->
<script>
for(let i=0;i<15;i++){
  const p=document.createElement('div');
  p.className='particle';
  p.style.cssText=`left:${Math.random()*100}%;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*10}s;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;background:${['#00d4ff','#9b30ff','#ff2244'][Math.floor(Math.random()*3)]}`;
  document.body.appendChild(p);
}
</script>

<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="header-top">
      <div id="title">⚡ ПРОКЛЯТАЯ БИТВА</div>
      <div id="level-badge" id="lvl-badge">УР.1 — УЧЕНИК</div>
    </div>
    <div id="energy-row">
      <span id="energy-icon">🔮</span>
      <span id="energy-amount">0</span>
      <div id="stats-mini">
        <div class="stat-mini">
          <span class="val" id="stat-tap">+1</span>
          <span class="lbl">за тап</span>
        </div>
        <div class="stat-mini">
          <span class="val" id="stat-ps">0/с</span>
          <span class="lbl">пассив</span>
        </div>
      </div>
    </div>
    <div id="xp-bar-wrap"><div id="xp-bar" style="width:0%"></div></div>
    <div id="xp-text">0 / 500 до следующего уровня</div>
  </div>

  <!-- CLICKER -->
  <div id="clicker-area">
    <div id="quote-box">
      <div id="quote-text">Проклятая энергия исходит из негативных эмоций людей...</div>
      <div class="quote-author" id="quote-author">— Сатору Годжо</div>
    </div>

    <div id="orb-wrap" onclick="handleTap(event)">
      <div id="orb">💀</div>
      <div id="orb-rings"></div>
    </div>

    <div id="tap-hint">нажми для сбора энергии</div>
  </div>

  <!-- TABS -->
  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab('techniques')">⚔️ Техники</button>
    <button class="tab-btn" onclick="switchTab('curses')">👁 Проклятья</button>
    <button class="tab-btn" onclick="switchTab('items')">🗡 Артефакты</button>
    <button class="tab-btn" onclick="switchTab('leaders')">🏆 Топы</button>
  </div>

  <!-- SHOP: Techniques -->
  <div id="shop-techniques" class="shop active" id="shop">
    <div class="shop-section-title" style="color:var(--accent)">⚔️ Боевые техники</div>
    <div class="shop-grid" id="grid-techniques"></div>
  </div>

  <!-- SHOP: Curses -->
  <div id="shop-curses" class="shop">
    <div class="shop-section-title" style="color:var(--purple)">👁 Проклятые духи</div>
    <div class="shop-grid" id="grid-curses"></div>
  </div>

  <!-- SHOP: Items -->
  <div id="shop-items" class="shop">
    <div class="shop-section-title" style="color:var(--gold)">🗡 Проклятые артефакты</div>
    <div class="shop-grid" id="grid-items"></div>
  </div>

  <!-- LEADERBOARD -->
  <div id="leaderboard">
    <div class="shop-section-title" style="color:var(--gold)">🏆 Топы</div>
    <div id="leaders-list"></div>
  </div>

</div>

<div id="toast"></div>

<script>
// ── GAME STATE ──
const SAVE_KEY = 'cursed_clicker_v1';

const LEVELS = [
  {name:'Ученик', xp:500},
  {name:'Помощник', xp:2000},
  {name:'Колдун 1 класса', xp:10000},
  {name:'Полуспец.', xp:50000},
  {name:'Спец.колдун', xp:200000},
  {name:'Мастер техник', xp:1000000},
  {name:'Особый класс', xp:Infinity},
];

const QUOTES = [
  ['Проклятая энергия исходит из негативных эмоций людей...','— Сатору Годжо'],
  ['Я не проиграю. Потому что есть то, что я должен защитить.','— Юдзи Итадори'],
  ['Сила — это не то, что даётся. Это то, что берётся.','— Тодж Фусигуро'],
  ['Мир несправедлив. Но это не повод отказываться от него.','— Мегуми Фусигуро'],
  ['Даже проклятый может найти смысл в жизни.','— Нобара Кугисаки'],
];

const UPGRADES = {
  techniques: [
    {id:'t1', name:'Удар кулаком', icon:'👊', rarity:'common', baseCost:100, perSec:1, perTap:0, maxLevel:5},
    {id:'t2', name:'Растяжение', icon:'🌀', rarity:'rare', baseCost:500, perSec:0, perTap:3, maxLevel:5},
    {id:'t3', name:'Чёрная вспышка', icon:'⚫', rarity:'epic', baseCost:2000, perSec:15, perTap:5, maxLevel:5},
    {id:'t4', name:'Полый фиолетовый', icon:'💜', rarity:'legendary', baseCost:20000, perSec:100, perTap:20, maxLevel:5},
    {id:'t5', name:'Десять теней', icon:'🐉', rarity:'epic', baseCost:8000, perSec:50, perTap:10, maxLevel:5},
    {id:'t6', name:'Бесконечность ∞', icon:'♾️', rarity:'legendary', baseCost:100000, perSec:500, perTap:50, maxLevel:5},
  ],
  curses: [
    {id:'c1', name:'Дух-паразит', icon:'🕷', rarity:'common', baseCost:150, perSec:2, perTap:0, maxLevel:5},
    {id:'c2', name:'Специальный дух', icon:'👁', rarity:'rare', baseCost:800, perSec:8, perTap:2, maxLevel:5},
    {id:'c3', name:'Проклятый червь', icon:'🐛', rarity:'rare', baseCost:3500, perSec:20, perTap:0, maxLevel:5},
    {id:'c4', name:'Тюрьма-скала', icon:'🪨', rarity:'epic', baseCost:15000, perSec:80, perTap:15, maxLevel:5},
    {id:'c5', name:'Рётай дух', icon:'🐍', rarity:'epic', baseCost:60000, perSec:300, perTap:30, maxLevel:5},
    {id:'c6', name:'Сукуна', icon:'😈', rarity:'legendary', baseCost:500000, perSec:2000, perTap:150, maxLevel:5},
  ],
  items: [
    {id:'i1', name:'Проклятый инструмент', icon:'🗡️', rarity:'common', baseCost:200, perSec:0, perTap:2, maxLevel:5},
    {id:'i2', name:'Печать Готэнба', icon:'📜', rarity:'rare', baseCost:1200, perSec:12, perTap:0, maxLevel:5},
    {id:'i3', name:'Кукла-хризантема', icon:'🌸', rarity:'rare', baseCost:4000, perSec:0, perTap:8, maxLevel:5},
    {id:'i4', name:'Тело Ёмы', icon:'⚱️', rarity:'epic', baseCost:18000, perSec:120, perTap:0, maxLevel:5},
    {id:'i5', name:'Катана Тодзи', icon:'⚔️', rarity:'epic', baseCost:75000, perSec:0, perTap:60, maxLevel:5},
    {id:'i6', name:'Мозг Кэндзяку', icon:'🧠', rarity:'legendary', baseCost:800000, perSec:3000, perTap:200, maxLevel:5},
  ],
};

const FAKE_LEADERS = [];

let state = loadState();

function defaultState() {
  return {
    energy: 0,
    totalEnergy: 0,
    level: 0,
    owned: {},
    lastTime: Date.now(),
  };
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(SAVE_KEY));
    return s || defaultState();
  } catch(e) { return defaultState(); }
}

function saveState() {
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
}

// ── COMPUTED ──
function getTapPower() {
  let base = 1;
  forEachUpgrade((up, lvl) => { base += up.perTap * lvl; });
  return base;
}

function getPerSecond() {
  let total = 0;
  forEachUpgrade((up, lvl) => { total += up.perSec * lvl; });
  return total;
}

function forEachUpgrade(fn) {
  for(const cat of Object.values(UPGRADES)) {
    for(const up of cat) {
      const lvl = state.owned[up.id] || 0;
      if(lvl > 0) fn(up, lvl);
    }
  }
}

function getCost(up) {
  const lvl = state.owned[up.id] || 0;
  return Math.floor(up.baseCost * Math.pow(1.6, lvl));
}

// ── UI ──
function fmt(n) {
  if(n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if(n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if(n >= 1000) return (n/1000).toFixed(1)+'K';
  return Math.floor(n).toString();
}

function updateHeader() {
  document.getElementById('energy-amount').textContent = fmt(state.energy);
  document.getElementById('stat-tap').textContent = '+'+fmt(getTapPower());
  document.getElementById('stat-ps').textContent = fmt(getPerSecond())+'/с';

  // Level
  let lvl = state.level;
  const L = LEVELS[lvl];
  const prev = lvl > 0 ? LEVELS[lvl-1].xp : 0;
  const xpNeeded = L.xp;
  const progress = Math.min(100, (state.totalEnergy / xpNeeded) * 100);

  // Level up?
  while(state.level < LEVELS.length - 1 && state.totalEnergy >= LEVELS[state.level].xp) {
    state.level++;
    showToast('⚡ НОВЫЙ УРОВЕНЬ: ' + LEVELS[state.level].name.toUpperCase());
    updateOrb();
  }

  const curLevel = LEVELS[state.level];
  document.getElementById('level-badge').textContent = 'УР.'+(state.level+1)+' — '+LEVELS[state.level].name.toUpperCase();
  document.getElementById('xp-bar').style.width = Math.min(100, (state.totalEnergy / curLevel.xp)*100) + '%';
  document.getElementById('xp-text').textContent = fmt(state.totalEnergy)+' / '+fmt(curLevel.xp)+' до следующего уровня';
}

const ORB_EMOJIS = ['💀','⚡','👁','🔮','💜','🌀','♾️'];
function updateOrb() {
  const idx = Math.min(state.level, ORB_EMOJIS.length-1);
  document.getElementById('orb').childNodes[0] && (document.getElementById('orb').childNodes[0].textContent='');
  document.getElementById('orb').textContent = ORB_EMOJIS[idx];
}

function renderShop(cat) {
  const grid = document.getElementById('grid-'+cat);
  if(!grid) return;
  grid.innerHTML = '';
  for(const up of UPGRADES[cat]) {
    const lvl = state.owned[up.id] || 0;
    const cost = getCost(up);
    const affordable = state.energy >= cost;
    const maxed = lvl >= up.maxLevel;

    const card = document.createElement('div');
    card.className = 'shop-card' + ((!affordable && !maxed) ? ' cant-afford' : '');
    card.onclick = () => buyUpgrade(up.id, cat);

    const bonusParts = [];
    if(up.perSec) bonusParts.push('+'+up.perSec*(lvl+1)+'/сек');
    if(up.perTap) bonusParts.push('+'+up.perTap*(lvl+1)+' тап');

    card.innerHTML = `
      <span class="rarity-badge rarity-${up.rarity}">${{common:'ОБЫЧНАЯ',rare:'РЕДКАЯ',epic:'ЭПИЧЕСКАЯ',legendary:'ЛЕГЕНДАРНАЯ'}[up.rarity]}</span>
      <span class="shop-icon">${up.icon}</span>
      <div class="shop-name">${up.name}</div>
      <div class="shop-bonus">${bonusParts.join(' ')}</div>
      ${maxed
        ? '<div class="shop-price" style="color:var(--gold)">✅ МАКС</div>'
        : `<div class="shop-price">🔮 ${fmt(cost)}</div>`
      }
      <div class="shop-level-dots">
        ${Array.from({length:up.maxLevel},(_,i)=>`<div class="dot ${i<lvl?'filled':''}"></div>`).join('')}
      </div>`;
    grid.appendChild(card);
  }
}

function renderLeaders() {
  const list = document.getElementById('leaders-list');
  const yourScore = state.totalEnergy;
  const all = [...FAKE_LEADERS, {name:'Ты 👤', score: yourScore, isYou:true}]
    .sort((a,b)=>b.score-a.score);

  list.innerHTML = '';
  all.forEach((l, i) => {
    const row = document.createElement('div');
    row.className = 'leader-row' + (l.isYou ? ' is-you' : '');
    const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
    row.innerHTML = `
      <div class="leader-rank ${rankClass}">${['🥇','🥈','🥉'][i]||'#'+(i+1)}</div>
      <div class="leader-name">${l.name}</div>
      <div class="leader-score">🔮 ${fmt(l.score)}</div>`;
    list.appendChild(row);
  });
}

function renderAll() {
  updateHeader();
  renderShop('techniques');
  renderShop('curses');
  renderShop('items');
  renderLeaders();
}

// ── ACTIONS ──
function handleTap(e) {
  if(state.gameOver) return;
  const power = getTapPower();
  state.energy += power;
  state.totalEnergy += power;

  // Pop effect
  const wrap = document.getElementById('orb-wrap');
  const rect = wrap.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  const pop = document.createElement('div');
  pop.className = 'click-pop';
  pop.textContent = '+'+fmt(power);
  pop.style.left = (cx - rect.left) + 'px';
  pop.style.top = (cy - rect.top) + 'px';
  wrap.appendChild(pop);
  setTimeout(() => pop.remove(), 900);

  updateHeader();
  // Re-render shop affordability
  const activeTab = document.querySelector('.tab-btn.active').getAttribute('onclick').match(/'(\w+)'/)[1];
  if(activeTab !== 'leaders') renderShop(activeTab);
}

function buyUpgrade(id, cat) {
  const up = UPGRADES[cat].find(u=>u.id===id);
  if(!up) return;
  const lvl = state.owned[id] || 0;
  if(lvl >= up.maxLevel) return;
  const cost = getCost(up);
  if(state.energy < cost) { showToast('⚠️ Недостаточно энергии!'); return; }

  state.energy -= cost;
  state.owned[id] = lvl + 1;

  // Flash
  const flash = document.createElement('div');
  flash.className = 'screen-flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 400);

  showToast('✅ '+up.name+' улучшено!');
  renderAll();
  saveState();
}

// Tab switching
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.shop, #leaderboard').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });

  event.target.classList.add('active');

  if(tab === 'leaders') {
    document.getElementById('leaderboard').style.display = 'block';
    renderLeaders();
  } else {
    const el = document.getElementById('shop-'+tab);
    if(el) { el.style.display = 'block'; renderShop(tab); }
  }
}

// Toast
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// Passive income
setInterval(() => {
  const ps = getPerSecond();
  if(ps > 0) {
    state.energy += ps / 10;
    state.totalEnergy += ps / 10;
    updateHeader();
  }
  saveState();
}, 100);

// Offline income
const offlineMs = Date.now() - (state.lastTime || Date.now());
if(offlineMs > 5000) {
  const offlineSecs = Math.min(offlineMs / 1000, 3600);
  const gained = getPerSecond() * offlineSecs * 0.5;
  if(gained > 0) {
    state.energy += gained;
    state.totalEnergy += gained;
    setTimeout(() => showToast('💤 Пока вас не было: +'+fmt(gained)+' 🔮'), 500);
  }
}
state.lastTime = Date.now();

// Rotating quotes
let quoteIdx = 0;
setInterval(() => {
  quoteIdx = (quoteIdx + 1) % QUOTES.length;
  document.getElementById('quote-text').textContent = QUOTES[quoteIdx][0];
  document.getElementById('quote-author').textContent = QUOTES[quoteIdx][1];
}, 8000);

// Init
updateOrb();
renderAll();
// Show first tab correctly
document.querySelectorAll('.shop').forEach(s => s.style.display = 'none');
document.getElementById('shop-techniques').style.display = 'block';
document.getElementById('leaderboard').style.display = 'none';
</script>
</body>
</html>
